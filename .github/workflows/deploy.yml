name: Build & Deploy (non-prod)

on:
  # Manual-only for now: run from the Actions tab via "Run workflow".
  # Uncomment to auto-deploy on every push to main.
  # push:
  #   branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-nonprod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build natively on the box (Oracle Ampere / arm64) — no registry, no
      # QEMU emulation. Ship a clean source archive (tracked files only).
      - name: Create source archive
        run: git archive --format=tar.gz -o src.tar.gz HEAD

      - name: Copy source archive to box
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: src.tar.gz
          target: ~/medsaas/

      - name: Build & restart on box
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/medsaas
            rm -rf src && mkdir -p src
            tar -xzf src.tar.gz -C src
            rm -f src.tar.gz
            docker compose -f docker-compose.box.yml up -d --build
            docker image prune -f
