name: Build & Deploy (non-prod)

on:
  # Manual-only for now: run from the Actions tab via "Run workflow".
  # Uncomment to auto-deploy on every push to main.
  # push:
  #   branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-nonprod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build natively on the box (Oracle Ampere / arm64) — no registry, no
      # QEMU. Ship a clean source archive (tracked files only) over native
      # ssh/scp, then docker compose up --build on the box.
      #
      # The app image is built ON THE BOX from the root Dockerfile (oven/bun
      # base, two-stage Bun build). All package resolution happens inside the
      # on-box image build, not on this runner — no runner-side Bun or Node
      # build step is needed here. To preserve this: do NOT add any oven/bun
      # runner action or runner-side build step to this job.
      - name: Deploy to box
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          SSHOPTS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15"

          git archive --format=tar.gz -o src.tar.gz HEAD
          scp $SSHOPTS src.tar.gz "$SSH_USER@$HOST:~/medsaas/src.tar.gz"
          ssh $SSHOPTS "$SSH_USER@$HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd ~/medsaas
          rm -rf src && mkdir -p src
          tar -xzf src.tar.gz -C src
          rm -f src.tar.gz
          docker compose -f docker-compose.box.yml up -d --build
          docker image prune -f
          REMOTE
