    <!-- RDKit.js initialization with proper error handling -->
    <script>
        // Global variables to track RDKit state
        window.rdkitModule = null;
        window.rdkitLoaded = false;
        window.rdkitError = null;
        
        // Function to initialize RDKit module
        window.initRDKitModule = function() {
            return new Promise((resolve, reject) => {
                // Return cached module if already loaded
                if (window.rdkitModule) {
                    resolve(window.rdkitModule);
                    return;
                }
                
                // Return cached error if previously failed
                if (window.rdkitError) {
                    reject(window.rdkitError);
                    return;
                }
                
                // Try to load RDKit script dynamically
                const loadRDKitScript = () => {
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js';
                    
                    script.onload = () => {
                        console.log('RDKit script loaded successfully');
                        initializeRDKit();
                    };
                    
                    script.onerror = () => {
                        console.warn('Failed to load RDKit from unpkg, trying alternative...');
                        // Try alternative CDN
                        const altScript = document.createElement('script');
                        altScript.src = 'https://cdn.jsdelivr.net/npm/@rdkit/rdkit/dist/RDKit_minimal.js';
                        
                        altScript.onload = () => {
                            console.log('RDKit script loaded from alternative CDN');
                            initializeRDKit();
                        };
                        
                        altScript.onerror = () => {
                            const error = new Error('Failed to load RDKit from all sources');
                            window.rdkitError = error;
                            reject(error);
                        };
                        
                        document.head.appendChild(altScript);
                    };
                    
                    document.head.appendChild(script);
                };
                
                // Function to initialize RDKit once script is loaded
                const initializeRDKit = () => {
                    let attempts = 0;
                    const maxAttempts = 50; // 10 seconds timeout
                    
                    const checkAndInit = () => {
                        attempts++;
                        
                        if (window.RDKit && typeof window.RDKit === 'function') {
                            console.log('RDKit function available, initializing...');
                            
                            window.RDKit().then(rdkit => {
                                console.log('RDKit initialized successfully');
                                window.rdkitModule = rdkit;
                                window.rdkitLoaded = true;
                                resolve(rdkit);
                            }).catch(error => {
                                console.error('RDKit initialization failed:', error);
                                window.rdkitError = error;
                                reject(error);
                            });
                        } else if (attempts < maxAttempts) {
                            setTimeout(checkAndInit, 200);
                        } else {
                            const error = new Error('RDKit failed to load within timeout');
                            window.rdkitError = error;
                            reject(error);
                        }
                    };
                    
                    checkAndInit();
                };
                
                // Check if RDKit is already available
                if (window.RDKit && typeof window.RDKit === 'function') {
                    initializeRDKit();
                } else {
                    // Load RDKit script if not already present
                    loadRDKitScript();
                }
            });
        };
        
        // Pre-load RDKit when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM ready, pre-loading RDKit...');
            window.initRDKitModule().then(() => {
                console.log('RDKit pre-loaded successfully');
            }).catch(error => {
                console.log('RDKit pre-loading failed:', error.message);
                console.log('Components can still use fallback methods');
            });
        });
    </script>
