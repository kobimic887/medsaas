# Self-contained non-prod run on the box (151.145.91.17).
# App image is BUILT ON THE BOX from ./src (git-archived source) — no registry,
# no Atlas. MongoDB runs as a local container with a persistent volume.
#   docker compose -f docker-compose.box.yml up -d --build
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASSWORD}", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    build:
      context: ./src
    image: medsaas:local
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file: .env
    healthcheck:
      test: ["CMD", "bun", "--eval", "const r = await fetch('http://localhost:3000/health'); process.exit(r.ok ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mongo-data:
